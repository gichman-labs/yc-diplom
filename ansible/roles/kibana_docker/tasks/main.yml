- name: Ensure Kibana directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/kibana
    - /opt/kibana/config

- name: Deploy kibana.yml
  ansible.builtin.template:
    src: kibana.yml.j2
    dest: /opt/kibana/config/kibana.yml
    mode: '0644'

- name: Remove old Kibana container if exists
  ansible.builtin.shell: |
    docker rm -f kibana >/dev/null 2>&1 || true

- name: Pull Kibana Docker image
  ansible.builtin.command: docker pull {{ kibana_docker_image }}

- name: Run Kibana container
  ansible.builtin.shell: |
    docker run -d \
      --name kibana \
      --restart unless-stopped \
      -p 5601:5601 \
      -v /opt/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro \
      {{ kibana_docker_image }}
  args:
    executable: /bin/bash

- name: Wait for Kibana port 5601
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 5601
    delay: 20
    timeout: 240
