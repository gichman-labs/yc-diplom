- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Create web root directory
  ansible.builtin.file:
    path: "{{ nginx_site_root }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ nginx_site_root }}/index.html"
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Deploy nginx site configuration
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Enable custom nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}.conf"
    state: link
  notify: Reload nginx

- name: Ensure nginx service is enabled and started
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
